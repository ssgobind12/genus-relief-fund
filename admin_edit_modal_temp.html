<!-- Add this right before the closing </body> tag in admin.html -->
    <!-- Edit Donation Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Edit Donation</h2>
            <form id="edit-donation-form">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="edit-name" required>
                </div>
                <div class="form-group">
                    <label>Mobile</label>
                    <input type="text" id="edit-mobile" required>
                </div>
                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="edit-amount" required>
                </div>
                <div class="form-group">
                    <label>Transaction ID</label>
                    <input type="text" id="edit-txn" required>
                </div>
                <div class="modal-actions" style="margin-top: 20px;">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <button type="button" class="btn close-modal" style="background: #ccc;">Cancel</button>
                </div>
            </form>
        </div>
    </div>
